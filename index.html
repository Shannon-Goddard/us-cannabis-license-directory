<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Cannabis License Directory</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fff;--fg:#111;--border:#e0e0e0;--hover:#f7f7f7;--accent:#111;--muted:#888;--edit-bg:#fffde7;--success:#2e7d32;--radius:6px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--fg);font-size:14px;line-height:1.5;display:flex;flex-direction:column;min-height:100vh}
header{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
header h1{font-size:18px;font-weight:600;letter-spacing:-0.3px}
header h1 span{color:var(--muted);font-weight:400}
.header-right{display:flex;align-items:center;gap:12px}
.search-box{padding:8px 14px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;width:240px;outline:none;transition:border .2s}
.search-box:focus{border-color:var(--accent)}
.btn{padding:8px 16px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);color:var(--fg);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--fg);color:var(--bg)}
.btn-primary{background:var(--fg);color:var(--bg);border-color:var(--fg)}
.btn-primary:hover{background:#333}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-success:hover{background:#1b5e20}
.user-info{display:flex;align-items:center;gap:8px;font-size:13px}
.user-info img{width:24px;height:24px;border-radius:50%}
main{flex:1;padding:16px 24px;overflow:hidden;display:flex;flex-direction:column}
.table-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.table-info span{font-size:13px;color:var(--muted)}
.table-container{flex:1;overflow:auto;border:1px solid var(--border);border-radius:var(--radius);position:relative}
table{border-collapse:collapse;width:max-content;min-width:100%}
thead{position:sticky;top:0;z-index:2}
th{background:var(--fg);color:var(--bg);padding:10px 14px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;text-align:left;border-right:1px solid #333;user-select:none;cursor:pointer}
th:hover{background:#333}
td{padding:8px 14px;border-bottom:1px solid var(--border);border-right:1px solid #f0f0f0;white-space:nowrap;font-size:13px;max-width:250px;overflow:hidden;text-overflow:ellipsis;cursor:default}
tr:hover td{background:var(--hover)}
td.editable{cursor:pointer}
td.editable:hover{background:#f0f4ff;outline:2px solid #90caf9;outline-offset:-2px}
td.editing{background:var(--edit-bg);padding:4px 6px}
td.editing input,td.editing select{width:100%;padding:6px 8px;border:2px solid var(--accent);border-radius:4px;font-size:13px;font-family:inherit;outline:none}
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;padding:16px 0}
.pagination button{padding:6px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg);cursor:pointer;font-size:13px}
.pagination button:hover{background:var(--hover)}
.pagination button:disabled{opacity:.4;cursor:default}
.pagination span{font-size:13px;color:var(--muted)}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:var(--radius);color:#fff;font-size:13px;font-weight:500;transform:translateY(100px);opacity:0;transition:all .3s;z-index:100}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:var(--success)}
.toast.error{background:#c62828}
footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--muted)}
footer a{color:var(--muted);text-decoration:none}
footer a:hover{color:var(--fg)}
.loading{display:flex;align-items:center;justify-content:center;padding:60px;color:var(--muted);font-size:14px}
.dot-pulse{display:inline-flex;gap:4px}
.dot-pulse span{width:6px;height:6px;background:var(--muted);border-radius:50%;animation:pulse .8s infinite}
.dot-pulse span:nth-child(2){animation-delay:.15s}
.dot-pulse span:nth-child(3){animation-delay:.3s}
@keyframes pulse{0%,80%,100%{opacity:.3;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.edit-bar{display:none;padding:10px 24px;background:#f5f5f5;border-bottom:1px solid var(--border);align-items:center;gap:12px;font-size:13px}
.edit-bar.active{display:flex}
@media(max-width:768px){
  header{padding:14px 16px}
  header h1{font-size:16px}
  .search-box{width:100%;order:3}
  main{padding:12px 16px}
  footer{padding:12px 16px;flex-direction:column;text-align:center}
}
</style>
</head>
<body>

<header>
  <h1>US Cannabis License Directory <span>· 13,128 records</span></h1>
  <div class="header-right">
    <input type="text" class="search-box" placeholder="Search businesses..." id="searchBox">
    <div id="authArea">
      <button class="btn" onclick="loginGithub()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        Login with GitHub
      </button>
    </div>
  </div>
</header>

<div class="edit-bar" id="editBar">
  <span>✏️ Editing: <strong id="editCellInfo"></strong></span>
  <button class="btn btn-success" onclick="submitEdit()">Submit Edit</button>
  <button class="btn" onclick="cancelEdit()">Cancel</button>
</div>

<main>
  <div class="table-info">
    <span id="tableStatus">Loading...</span>
    <span id="pageInfo"></span>
  </div>
  <div class="table-container" id="tableContainer">
    <div class="loading" id="loadingIndicator">
      <div class="dot-pulse"><span></span><span></span><span></span></div>&nbsp; Loading directory...
    </div>
    <table id="dataTable" style="display:none">
      <thead><tr id="headerRow"></tr></thead>
      <tbody id="dataBody"></tbody>
    </table>
  </div>
  <div class="pagination">
    <button onclick="changePage(-1)" id="prevBtn" disabled>← Previous</button>
    <span id="pageDisplay">Page 1</span>
    <button onclick="changePage(1)" id="nextBtn">Next →</button>
  </div>
</main>

<footer>
  <span>© 2026 Shannon Goddard · Loyal9 LLC · <a href="https://doi.org/10.5281/zenodo.19800772">DOI: 10.5281/zenodo.19800772</a></span>
  <span>AWS cost this month: $0.00 · <a href="https://github.com/sponsors/Shannon-Goddard">GitHub ❤️ Sponsor</a></span>
</footer>

<div class="toast" id="toast"></div>

<script>
const API_BASE = 'https://f5o10xxd59.execute-api.us-east-1.amazonaws.com';
const GITHUB_CLIENT_ID = 'Ov23liKiB0cfxUd7K3KH';
const CSV_URL = 'us-cannabis-license-directory.csv';
const ROWS_PER_PAGE = 10;

const DROPDOWN_FIELDS = {
  'Business_Category': ['','Single Location','Multi-Location','MSO','Vertically Integrated','Boutique','Franchise'],
  'Is_Medical': ['','TRUE','FALSE'],
  'Is_Adult_Use': ['','TRUE','FALSE'],
  'Social_Equity_Status': ['','TRUE','FALSE'],
  'Home_Delivery': ['','TRUE','FALSE']
};
const MULTI_SELECT_HINT = ['Product_Focus','Payment_Methods','Ownership_Type'];

let allData = [];
let filteredData = [];
let headers = [];
let currentPage = 0;
let githubToken = null;
let githubUser = null;
let editingCell = null;
let editOriginalValue = '';

// CSV Parser — handles quoted fields with commas
function parseCSV(text) {
  const rows = [];
  let i = 0;
  while (i < text.length) {
    const row = [];
    while (i < text.length) {
      let val = '';
      if (text[i] === '"') {
        i++;
        while (i < text.length) {
          if (text[i] === '"' && text[i+1] === '"') { val += '"'; i += 2; }
          else if (text[i] === '"') { i++; break; }
          else { val += text[i]; i++; }
        }
      } else {
        while (i < text.length && text[i] !== ',' && text[i] !== '\n' && text[i] !== '\r') {
          val += text[i]; i++;
        }
      }
      row.push(val);
      if (i < text.length && text[i] === ',') { i++; }
      else break;
    }
    if (text[i] === '\r') i++;
    if (text[i] === '\n') i++;
    if (row.length > 1 || row[0] !== '') rows.push(row);
  }
  return rows;
}

async function loadData() {
  try {
    const resp = await fetch(CSV_URL);
    const text = await resp.text();
    const rows = parseCSV(text.replace(/^\uFEFF/, ''));
    headers = rows[0];
    allData = rows.slice(1).filter(r => r.length >= headers.length / 2);
    filteredData = [...allData];
    document.getElementById('loadingIndicator').style.display = 'none';
    document.getElementById('dataTable').style.display = '';
    renderHeaders();
    renderPage();
    document.getElementById('tableStatus').textContent =
      `${filteredData.length.toLocaleString()} records · ${headers.length} columns · 35 states`;
  } catch(e) {
    document.getElementById('loadingIndicator').innerHTML = '❌ Failed to load data: ' + e.message;
  }
}

function renderHeaders() {
  const tr = document.getElementById('headerRow');
  tr.innerHTML = '<th style="width:40px">#</th>' +
    headers.map((h, i) => `<th onclick="sortBy(${i})" title="${h}">${h}</th>`).join('');
}

function renderPage() {
  const start = currentPage * ROWS_PER_PAGE;
  const page = filteredData.slice(start, start + ROWS_PER_PAGE);
  const tbody = document.getElementById('dataBody');
  const isLoggedIn = !!githubToken;

  tbody.innerHTML = page.map((row, ri) => {
    const globalIdx = start + ri;
    return '<tr>' +
      `<td style="color:var(--muted);font-size:12px">${globalIdx + 1}</td>` +
      headers.map((h, ci) => {
        const val = row[ci] || '';
        const cls = isLoggedIn ? ' class="editable"' : '';
        const click = isLoggedIn ? ` onclick="startEdit(${globalIdx},${ci})"` : '';
        return `<td${cls}${click} title="${val.replace(/"/g,'&quot;')}">${escHtml(val)}</td>`;
      }).join('') +
      '</tr>';
  }).join('');

  const totalPages = Math.ceil(filteredData.length / ROWS_PER_PAGE);
  document.getElementById('pageDisplay').textContent = `Page ${currentPage + 1} of ${totalPages.toLocaleString()}`;
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage >= totalPages - 1;
  document.getElementById('pageInfo').textContent =
    `Showing ${start + 1}–${Math.min(start + ROWS_PER_PAGE, filteredData.length)} of ${filteredData.length.toLocaleString()}`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function changePage(dir) {
  currentPage += dir;
  renderPage();
  document.getElementById('tableContainer').scrollTop = 0;
}

let sortCol = -1, sortAsc = true;
function sortBy(ci) {
  if (sortCol === ci) sortAsc = !sortAsc;
  else { sortCol = ci; sortAsc = true; }
  filteredData.sort((a, b) => {
    const va = (a[ci]||'').toLowerCase(), vb = (b[ci]||'').toLowerCase();
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });
  currentPage = 0;
  renderPage();
}

document.getElementById('searchBox').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  filteredData = q ? allData.filter(r => r.some(c => c.toLowerCase().includes(q))) : [...allData];
  currentPage = 0;
  renderPage();
  document.getElementById('tableStatus').textContent =
    `${filteredData.length.toLocaleString()} records` + (q ? ` matching "${this.value}"` : ` · ${headers.length} columns · 35 states`);
});

// GitHub OAuth
function loginGithub() {
  const redirect = window.location.origin + window.location.pathname;
  window.location.href = `https://github.com/login/oauth/authorize?client_id=${GITHUB_CLIENT_ID}&redirect_uri=${encodeURIComponent(redirect)}&scope=read:user`;
}

async function handleOAuthCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (!code) return;
  window.history.replaceState({}, '', window.location.pathname);
  try {
    const resp = await fetch(`${API_BASE}/auth/github`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({code})
    });
    const data = await resp.json();
    if (data.access_token) {
      githubToken = data.access_token;
      githubUser = data.username;
      document.getElementById('authArea').innerHTML =
        `<div class="user-info"><img src="${data.avatar_url}" alt="">${data.username}</div>
         <button class="btn" onclick="logout()">Logout</button>`;
      showToast(`Welcome, ${data.username}!`, 'success');
      renderPage();
    }
  } catch(e) {
    showToast('GitHub login failed', 'error');
  }
}

function logout() {
  githubToken = null;
  githubUser = null;
  document.getElementById('authArea').innerHTML =
    `<button class="btn" onclick="loginGithub()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
      Login with GitHub</button>`;
  renderPage();
}

// Cell editing
function startEdit(rowIdx, colIdx) {
  if (!githubToken) return;
  if (editingCell) cancelEdit();

  const colName = headers[colIdx];
  const currentVal = filteredData[rowIdx][colIdx] || '';
  editOriginalValue = currentVal;
  editingCell = {rowIdx, colIdx, colName};

  const rows = document.getElementById('dataBody').rows;
  const pageRow = rowIdx - currentPage * ROWS_PER_PAGE;
  if (pageRow < 0 || pageRow >= rows.length) return;
  const td = rows[pageRow].cells[colIdx + 1]; // +1 for row number column

  td.className = 'editing';
  if (DROPDOWN_FIELDS[colName]) {
    const opts = DROPDOWN_FIELDS[colName].map(o =>
      `<option value="${o}"${o === currentVal ? ' selected' : ''}>${o || '—'}</option>`).join('');
    td.innerHTML = `<select id="editInput">${opts}</select>`;
  } else {
    const hint = MULTI_SELECT_HINT.includes(colName) ? ' placeholder="Pipe-separate: val1|val2"' : '';
    td.innerHTML = `<input id="editInput" type="text" value="${currentVal.replace(/"/g,'&quot;')}"${hint}>`;
  }
  document.getElementById('editInput').focus();
  document.getElementById('editBar').classList.add('active');
  document.getElementById('editCellInfo').textContent =
    `Row ${rowIdx + 1} · ${colName}`;
}

function cancelEdit() {
  if (!editingCell) return;
  editingCell = null;
  editOriginalValue = '';
  document.getElementById('editBar').classList.remove('active');
  renderPage();
}

async function submitEdit() {
  if (!editingCell || !githubToken) return;
  const input = document.getElementById('editInput');
  const newValue = input.value;
  if (newValue === editOriginalValue) { cancelEdit(); return; }

  const {rowIdx, colIdx, colName} = editingCell;
  const businessName = filteredData[rowIdx][headers.indexOf('Business_Name')] || '';
  const licenseNum = filteredData[rowIdx][headers.indexOf('License_Number')] || '';

  try {
    const resp = await fetch(`${API_BASE}/edit`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        github_token: githubToken,
        row_index: licenseNum || String(rowIdx),
        column: colName,
        old_value: editOriginalValue,
        new_value: newValue,
        business_name: businessName
      })
    });
    const data = await resp.json();
    if (resp.ok) {
      filteredData[rowIdx][colIdx] = newValue;
      showToast(`Edit submitted by ${data.user}`, 'success');
    } else {
      showToast(data.error || 'Submit failed', 'error');
    }
  } catch(e) {
    showToast('Network error: ' + e.message, 'error');
  }
  cancelEdit();
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') cancelEdit();
  if (e.key === 'Enter' && editingCell) submitEdit();
});

// Init
handleOAuthCallback();
loadData();
</script>
</body>
</html>
